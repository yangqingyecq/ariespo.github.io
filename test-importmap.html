<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>诊断：修仙游戏启动错误</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { background: #0b1020; color: #e5e7eb; font-family: monospace; padding: 20px; }
    h1 { color: #ffd700; }
    #app { padding: 20px; border: 1px solid #333; border-radius: 8px; margin: 10px 0; min-height: 100px; }
    #console { background: #050a14; padding: 16px; border-radius: 8px; max-height: 500px; overflow-y: auto; font-size: 13px; }
    .log-entry { padding: 2px 0; border-bottom: 1px solid #1a1a2a; }
    .error { color: #ff6b6b; }
    .warn { color: #ffd93d; }
    .info { color: #6bcbff; }
    .success { color: #6bff6b; }
  </style>
</head>
<body>
  <h1>🛠 修仙游戏 - 错误诊断页</h1>
  <p>页面加载时会捕获并显示所有关键错误。</p>
  <p id="step-status">正在初始化...</p>
  
  <div id="console"></div>

  <!-- 劫持 console 来捕获调试信息 -->
  <script>
    const consoleDiv = document.getElementById('console');
    const origLog = console.log.bind(console);
    const origError = console.error.bind(console);
    const origWarn = console.warn.bind(console);
    
    function logToScreen(level, args) {
      const div = document.createElement('div');
      div.className = 'log-entry ' + level;
      div.textContent = `[${new Date().toISOString().slice(11,19)}] [${level}] ${Array.from(args).map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' ')}`;
      consoleDiv.appendChild(div);
      consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }
    
    console.log = function() { origLog.apply(console, arguments); logToScreen('info', arguments); };
    console.error = function() { origError.apply(console, arguments); logToScreen('error', arguments); };
    console.warn = function() { origLog.apply(console, arguments); logToScreen('warn', arguments); };
    
    window.addEventListener('error', function(e) {
      console.error('🚨 全局错误:', e.message, 'at', e.filename + ':' + e.lineno + ':' + e.colno);
      document.getElementById('step-status').textContent = '❌ 发生错误!';
      document.getElementById('step-status').style.color = '#ff6b6b';
    });
    
    window.addEventListener('unhandledrejection', function(e) {
      console.error('🚨 Promise 未处理拒绝:', e.reason?.message || e.reason);
    });
  </script>

  <!-- 原来的 Dexie 加载脚本 -->
  <script>
    (function () {
      const CDN_URLS = [
        'https://unpkg.com/dexie/dist/dexie.js',
        'https://cdn.jsdelivr.net/npm/dexie@latest/dist/dexie.js',
        'https://cdnjs.cloudflare.com/ajax/libs/dexie/3.2.4/dexie.min.js',
      ];
      let currentCDNIndex = 0;
      function loadDexie() {
        if (currentCDNIndex >= CDN_URLS.length) {
          console.error('所有Dexie CDN都加载失败，系统将使用localStorage作为备用存储');
          window.DexieLoadFailed = true;
          return;
        }
        const script = document.createElement('script');
        script.src = CDN_URLS[currentCDNIndex];
        script.async = true;
        script.onload = function () {
          console.log('Dexie加载成功，来源: ' + CDN_URLS[currentCDNIndex]);
          window.DexieLoadFailed = false;
          window.dispatchEvent(new CustomEvent('dexieLoaded', { detail: { source: CDN_URLS[currentCDNIndex] } }));
        };
        script.onerror = function () {
          console.warn('CDN ' + CDN_URLS[currentCDNIndex] + ' 加载失败，尝试下一个...');
          currentCDNIndex++;
          loadDexie();
        };
        document.head.appendChild(script);
      }
      loadDexie();
    })();
  </script>

  <!-- 导入映射 -->
  <script type="importmap">
  {
    "imports": {
      "https://testingcf.jsdelivr.net/npm/dexie/+esm": "./dexie.esm.js",
      "https://testingcf.jsdelivr.net/npm/scheduler/+esm": "./scheduler.esm.js"
    }
  }
  </script>

  <script type="module">
    document.getElementById('step-status').textContent = '⏳ 模块脚本已开始执行...';
    console.log('✅ 模块脚本开始执行');
    console.log('📋 document.readyState =', document.readyState);
    console.log('📋 #app 元素存在:', !!document.getElementById('app'));

    // 测试 importmap
    try {
      const dexieMod = await import("https://testingcf.jsdelivr.net/npm/dexie/+esm");
      console.log('✅ Dexie ESM 导入成功, 默认导出类型:', typeof dexieMod.default);
    } catch(e) {
      console.error('❌ Dexie ESM 导入失败:', e.message);
    }

    try {
      const schedMod = await import("https://testingcf.jsdelivr.net/npm/scheduler/+esm");
      console.log('✅ Scheduler ESM 导入成功');
    } catch(e) {
      console.error('❌ Scheduler ESM 导入失败:', e.message);
    }

    document.getElementById('step-status').textContent = '⏳ 即将加载游戏主模块...';

    try {
      // 现在加载游戏主模块
      await import('./index.html?game=1');
    } catch(e) {
      console.error('❌ 无法加载游戏:', e.message);
      document.getElementById('step-status').textContent = '❌ 游戏启动失败: ' + e.message;
    }
  </script>
</body>
</html>
